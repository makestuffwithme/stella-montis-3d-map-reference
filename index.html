<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stella Montis 3D Map</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="controls-card" class="controls-card">
      <div class="controls-card-header">
        <h3>Controls</h3>
        <button type="button" class="controls-card-toggle" id="controls-card-toggle" title="Minimize" aria-label="Minimize">−</button>
      </div>
      <div class="controls-card-body">
        <ul>
          <li><kbd>w</kbd><kbd>a</kbd><kbd>s</kbd><kbd>d</kbd> move</li>
          <li><kbd>space</kbd> up <kbd>c</kbd> down</li>
          <li><kbd>shift</kbd> sprint</li>
          <li><kbd>right mouse</kbd> free look</li>
        </ul>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
