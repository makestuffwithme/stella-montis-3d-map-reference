<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stella Montis 3D Map</title>
  </head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JENP9Y9BBJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-JENP9Y9BBJ');
  </script>
  <body>
    <div id="app"></div>
    <div id="controls-card" class="controls-card">
      <div class="controls-card-header">
        <h3>Controls</h3>
        <button type="button" class="controls-card-toggle" id="controls-card-toggle" title="Minimize" aria-label="Minimize">−</button>
      </div>
      <div class="controls-card-body">
        <ul>
          <li><kbd>w</kbd><kbd>a</kbd><kbd>s</kbd><kbd>d</kbd> move</li>
          <li><kbd>space</kbd> up <kbd>c</kbd> down</li>
          <li><kbd>shift</kbd> sprint</li>
          <li><kbd>left click</kbd> toggle mouselook</li>
          <li>
            <label class="controls-option">
              <input type="checkbox" id="invert-mouse" />
              <span>invert mouselook</span>
            </label>
          </li>
        </ul>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
